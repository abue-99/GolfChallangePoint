name: golfchallangepoint
services:
  web:
    build: .
    container_name: golfchallangepoint-web
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/challengenpoint
    ports:
      - "80:3000"     # falls :80 frei ist; sonst testweise "8080:3000"
      - "3839:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: golfchallangepoint-db-1
    environment:
      POSTGRES_DB: challengenpoint
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d challengenpoint -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  default:
    name: golfchallangepoint_default

volumes:
  db_data:
    name: golfchallangepoint_db_data