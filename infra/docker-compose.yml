version: "3.9"
services:
  db:
    image: postgres:16
    container_name: challengepoint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challengepoint
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d challengepoint -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
